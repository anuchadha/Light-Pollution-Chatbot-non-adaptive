<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Pollution Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --surface2: #1a2238;
    --border: #1e2d4a;
    --accent: #4a90d9;
    --accent2: #f5a623;
    --text: #dce6f5;
    --text-muted: #7a8fb0;
    --user-bubble: #1a3460;
    --bot-bubble: #131929;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(200,216,245,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(200,216,245,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, rgba(200,216,245,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, rgba(200,216,245,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 35%, rgba(200,216,245,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 70%, rgba(200,216,245,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 15%, rgba(200,216,245,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(200,216,245,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(200,216,245,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 40%, rgba(200,216,245,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative; z-index: 10;
    padding: 14px 20px;
    background: linear-gradient(180deg, #0d1526 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }

  .header-icon { font-size: 22px; }
  .header-text h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
  .header-text p  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .suggestions {
    position: relative; z-index: 10;
    padding: 10px 16px;
    display: flex; gap: 7px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: rgba(11,15,26,0.6);
  }

  .suggestions-label {
    width: 100%;
    font-size: 10px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .suggestion-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px; color: var(--accent);
    background: rgba(74,144,217,0.08);
    border: 1px solid rgba(74,144,217,0.25);
    border-radius: 20px; padding: 5px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .suggestion-btn:hover { background: rgba(74,144,217,0.18); border-color: rgba(74,144,217,0.5); }

  #chat {
    position: relative; z-index: 10;
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex; gap: 10px;
    max-width: 88%;
    animation: fadeUp 0.22s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .bot .avatar  { background: linear-gradient(135deg,#1a3460,#0d1e40); border: 1px solid var(--border); }
  .user .avatar { background: linear-gradient(135deg,#1a3460,#2a4a80); border: 1px solid rgba(74,144,217,0.3); }

  .bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 13.5px; line-height: 1.65;
  }
  .bot .bubble  { background: var(--bot-bubble); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
  .user .bubble { background: var(--user-bubble); border: 1px solid rgba(74,144,217,0.2); border-radius: 14px 4px 14px 14px; }

  .bubble ul { margin: 6px 0 4px 18px; display: flex; flex-direction: column; gap: 3px; }
  .bubble strong { color: var(--accent2); font-weight: 600; }
  .bubble em { color: var(--text-muted); font-style: italic; font-size: 12.5px; }

  .redirect-qs { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .redirect-qs button {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--accent);
    background: rgba(74,144,217,0.08);
    border: 1px solid rgba(74,144,217,0.25);
    border-radius: 20px; padding: 5px 12px;
    cursor: pointer; text-align: left;
    transition: background 0.15s;
    width: fit-content;
  }
  .redirect-qs button:hover { background: rgba(74,144,217,0.18); }

  .input-area {
    position: relative; z-index: 10;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: rgba(11,15,26,0.85);
    display: flex; gap: 8px; align-items: flex-end;
  }

  #userInput {
    flex: 1;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    color: var(--text); resize: none;
    min-height: 42px; max-height: 120px;
    outline: none; transition: border-color 0.15s; line-height: 1.5;
  }
  #userInput::placeholder { color: var(--text-muted); }
  #userInput:focus { border-color: rgba(74,144,217,0.5); }

  #sendBtn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px; padding: 10px 16px;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    height: 42px;
  }
  #sendBtn:hover  { background: #5a9fe8; }
  #sendBtn:active { transform: scale(0.97); }

  .footer-note {
    text-align: center; font-size: 10px; color: var(--text-muted);
    padding: 4px 0 8px; position: relative; z-index: 10;
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">🌃</div>
  <div class="header-text">
    <h1>Light Pollution Guide</h1>
    <p>Ask me anything from the lesson</p>
  </div>
  <div class="badge">Science Fair</div>
</header>

<div class="suggestions">
  <div class="suggestions-label">Try asking:</div>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">What is light pollution?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">What are the types?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">What is skyglow?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">How does it affect animals?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">How is it measured?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">How can we reduce it?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">What is glare?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">What is light trespass?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">What is light clutter?</button>
  <button class="suggestion-btn" onclick="askQuestion(this.textContent)">How does it affect human health?</button>
</div>

<div id="chat"></div>

<div class="input-area">
  <textarea id="userInput" placeholder="Ask a question about light pollution…" rows="1"></textarea>
  <button id="sendBtn" onclick="handleSend()">Send</button>
</div>
<div class="footer-note">No internet or login needed. Answers based on your class presentation.</div>

<script>
const KB = [
  {
    keys: ["what is light pollution","define light pollution","meaning","explain light pollution","what does light pollution mean","light pollution is"],
    answer: `<strong>Light pollution</strong> is excessive or misdirected artificial light at night that brightens the night sky and disrupts natural darkness.<br><br>
Instead of lighting only the ground, many lights send energy upward into the sky or sideways — creating a glowing haze called <strong>skyglow</strong>. This makes it hard to see stars, disrupts wildlife, and wastes energy.<br><br>
<strong>Key facts:</strong>
<ul>
  <li>Over <strong>80% of the world's population</strong> lives under light-polluted skies</li>
  <li>In many cities, the <strong>Milky Way is no longer visible</strong></li>
  <li>It is one of the <strong>fastest-growing forms of environmental pollution</strong></li>
</ul>`
  },
  {
    keys: ["sources","causes","where does light pollution come from","what causes","what produces","examples of sources"],
    answer: `<strong>Common sources of light pollution:</strong>
<ul>
  <li>🔦 <strong>Streetlights</strong></li>
  <li>🏢 <strong>Buildings</strong> left illuminated at night</li>
  <li>📢 <strong>Billboards and advertisements</strong></li>
  <li>🏟️ <strong>Stadium and parking lot lighting</strong></li>
</ul>
These sources often send light upward or sideways instead of just where it's needed.`
  },
  {
    keys: ["types of light pollution","kinds","categories","how many types","different types","list the types","what are the types"],
    answer: `There are <strong>4 types of light pollution:</strong>
<ul>
  <li>🌆 <strong>Skyglow</strong> – the bright glow seen above cities at night</li>
  <li>💡 <strong>Glare</strong> – extremely bright light that causes discomfort and reduces visibility</li>
  <li>🏠 <strong>Light Trespass</strong> – unwanted light entering places where it is not needed</li>
  <li>🔱 <strong>Light Clutter</strong> – many bright lights together causing confusion and distraction</li>
</ul>
Ask me about any of these for more detail!`
  },
  {
    keys: ["skyglow","sky glow","glow above city","glow over city","bright sky at night","can't see stars","milky way not visible","why is the sky bright"],
    answer: `<strong>Skyglow</strong> is the bright glow seen above cities at night. 🌆<br><br>
It is caused when artificial light from buildings and streetlights <strong>scatters in the atmosphere</strong>, creating a glowing dome over cities. This makes it very difficult — sometimes impossible — to see stars and the Milky Way from urban areas.`
  },
  {
    keys: ["glare","what is glare","bright light discomfort","blinding light","headlights","too bright","reduces visibility","hard to see","dangerous driving"],
    answer: `<strong>Glare</strong> is extremely bright light that causes discomfort and reduces visibility. 💡<br><br>
It is often caused by <strong>unshielded or overly bright lights</strong>. Glare makes it hard to see clearly at night and can be <strong>dangerous while driving</strong>.<br><br>
<em>Example: blinding car headlights or harsh streetlights shining directly into your eyes.</em>`
  },
  {
    keys: ["light trespass","trespass","unwanted light","light in window","light entering home","shines into bedroom","disturbs sleep","light in private"],
    answer: `<strong>Light Trespass</strong> is unwanted light entering places where it is not needed. 🏠<br><br>
<ul>
  <li>Shines into <strong>homes, windows, or private spaces</strong></li>
  <li>Can <strong>disturb sleep</strong> and wildlife</li>
  <li>Happens when lights are <strong>not properly directed</strong></li>
</ul>
A common example: a streetlight shining straight into a bedroom window at night.`
  },
  {
    keys: ["light clutter","clutter","too many lights","group of lights","bright lights together","confusion from lights","commercial lights","neon signs"],
    answer: `<strong>Light Clutter</strong> is a group of many bright lights close together that create confusion and distraction. 🔱<br><br>
<ul>
  <li>Common in <strong>commercial areas and busy roads</strong></li>
  <li>Can <strong>confuse drivers</strong> and distract attention</li>
  <li>Often <strong>wastes large amounts of energy</strong></li>
</ul>
Think of a busy street packed with neon signs, billboards, and store lights all competing for attention.`
  },
  {
    keys: ["impacts","effects","what does light pollution do","consequences","problems caused","why is light pollution bad"],
    answer: `Light pollution has three major areas of impact:<br><br>
<ul>
  <li>🌍 <strong>The Environment</strong> – wastes energy and contributes to CO₂ emissions</li>
  <li>🐢 <strong>Wildlife</strong> – disrupts natural animal behavior and navigation</li>
  <li>😴 <strong>Human Health</strong> – disturbs sleep, circadian rhythms, and safety</li>
</ul>
Ask me about any of these for more detail!`
  },
  {
    keys: ["wildlife","animals","affect animals","animal behavior","sea turtle","turtle","bird","birds","insects","bugs","disoriented","crash into buildings","attracted to light","impact on animals","nature"],
    answer: `Light pollution <strong>disrupts natural animal behavior</strong> in several serious ways: 🐢🐦🦟<br><br>
<ul>
  <li><strong>Sea turtles</strong> get disoriented by bright coastal lights and move <em>away</em> from the ocean instead of toward it</li>
  <li><strong>Birds</strong> get confused by city lights and crash into buildings at night</li>
  <li><strong>Insects</strong> are attracted to artificial lights and die near them, disrupting food chains</li>
</ul>`
  },
  {
    keys: ["human health","health","sleep","melatonin","circadian","body clock","accident","affect humans","impact on people","tired","insomnia","light at night health"],
    answer: `Too much artificial light at night affects <strong>human health and safety</strong>: 😴<br><br>
<ul>
  <li>Disrupts the body's <strong>circadian rhythm</strong>, making it harder to fall asleep</li>
  <li>Causes <strong>glare</strong> that increases accident risk, especially while driving</li>
  <li>Reduces <strong>melatonin production</strong> — the hormone your body needs for healthy sleep</li>
</ul>`
  },
  {
    keys: ["environment","co2","carbon","energy waste","environmental impact","ecosystem","affect environment","carbon dioxide"],
    answer: `Light pollution also impacts the <strong>environment</strong> more broadly. 🌍<br><br>
Wasted artificial light consumes enormous amounts of electricity, contributing to <strong>CO₂ emissions</strong> and energy waste. This makes light pollution not just a visibility problem, but also a <strong>climate and energy issue</strong>.`
  },
  {
    keys: ["measure","measured","measurement","sky quality meter","how bright","mag arcsec","magnitudes","dark sky number","how do scientists measure","sqm","sky brightness","what unit"],
    answer: `Scientists measure light pollution using <strong>Sky Brightness</strong>. 🔭<br><br>
The tool is called a <strong>Sky Quality Meter (SQM)</strong>. The unit is <strong>mag/arcsec²</strong> (magnitudes per square arcsecond).<br><br>
<ul>
  <li><strong>22 mag/arcsec²</strong> → very dark, natural sky ⭐</li>
  <li><strong>17 mag/arcsec²</strong> → bright city sky 🌆</li>
</ul>
<em>Higher numbers = darker, less polluted skies.</em>`
  },
  {
    keys: ["satellite","satellites","space","images from space","map of light pollution","global map","track light pollution","detect from space","nighttime images"],
    answer: `Satellites also measure light pollution from space! 🛰️<br><br>
They detect artificial light from Earth at night and scientists use this data to:
<ul>
  <li>Capture <strong>images of city lights from space</strong></li>
  <li>Create <strong>global maps</strong> of light pollution</li>
  <li><strong>Track changes over time</strong> to see if things are getting better or worse</li>
</ul>`
  },
  {
    keys: ["reduce","solution","solutions","fix","what can i do","individual","home","shielded light","motion sensor","timer","dimmer","darksky","led","bulb","outdoor light","curtain","blinds","lower watt","personal action"],
    answer: `There are many things <strong>individuals and families</strong> can do! 💡<br><br>
<strong>Outdoor lighting:</strong>
<ul>
  <li>Use <strong>shielded lights</strong> that direct light downward only</li>
  <li>Use outdoor lights <strong>only when needed</strong></li>
  <li>Install <strong>motion sensors, timers, or dimmers</strong></li>
</ul>
<strong>Better bulb choices:</strong>
<ul>
  <li>Look for <strong>"DarkSky Approved"</strong> products</li>
  <li>Use <strong>lower-watt bulbs</strong> to reduce brightness</li>
  <li>Choose <strong>warm-colored LEDs</strong> (amber/yellow, under 3000K)</li>
</ul>
<strong>Indoors:</strong>
<ul>
  <li>Close <strong>curtains or blinds</strong> at night to keep indoor light from escaping</li>
</ul>`
  },
  {
    keys: ["community","school","city","school actions","dark sky club","parking lot lights","sports field","limit lighting","globe at night","loss of the night","app","student involvement","collect data"],
    answer: `Communities and schools can take action too! 🏫<br><br>
<strong>Community/School Actions:</strong>
<ul>
  <li>Ask school officials to <strong>shield parking lot and sports field lights</strong></li>
  <li><strong>Limit lighting time</strong> — turn off lights when not needed</li>
  <li>Join or start a <strong>"Dark Sky Club"</strong> to monitor local skies</li>
</ul>
<strong>Student Involvement:</strong>
<ul>
  <li>Use apps like <strong>Loss of the Night</strong> or <strong>Globe at Night</strong></li>
  <li>Collect sky brightness data and share your findings!</li>
</ul>`
  },
  {
    keys: ["advocacy","advocate","elected official","policy","government","laws","lights out","bird migration","dark sky policy","rules","contact official","legislation"],
    answer: `You can make a bigger difference through <strong>advocacy</strong>! 📢<br><br>
<ul>
  <li>Contact <strong>elected officials</strong> to support better lighting rules</li>
  <li>Support <strong>dark-sky policies</strong> in your community</li>
  <li>Advocate for <strong>"Lights Out" nights</strong> during bird migration season to protect wildlife</li>
</ul>
Even middle schoolers can write letters or join campaigns to make a real impact!`
  },
  {
    keys: ["80%","80 percent","statistic","key fact","how many people","population","milky way","fastest growing","fun fact","facts about light pollution"],
    answer: `Here are some powerful <strong>key facts</strong> from the lesson:<br><br>
<ul>
  <li>Over <strong>80% of the world's population</strong> lives under light-polluted skies</li>
  <li>In many cities, the <strong>Milky Way is no longer visible</strong> at all</li>
  <li>Light pollution is one of the <strong>fastest-growing forms of environmental pollution</strong></li>
</ul>`
  },
  {
    keys: ["quote","motto","saying","closing","slogan","theme","lesson quote"],
    answer: `The lesson closes with this powerful reminder:<br><br>
<blockquote style="border-left:3px solid var(--accent2);padding-left:12px;margin:6px 0;font-style:italic;color:var(--accent2);">
  "Use only the light you need, where you need it, when you need it."
</blockquote>
It's not about having no light — just using it <strong>wisely</strong>! 🌟`
  }
];

const REDIRECT_POOL = [
  "What is light pollution?",
  "What are the types?",
  "What is skyglow?",
  "How does it affect animals?",
  "How does it affect human health?",
  "How is it measured?",
  "How can we reduce it?",
  "What is glare?",
  "What is light trespass?",
  "What is light clutter?"
];

function findAnswer(raw) {
  const q = raw.toLowerCase().trim();
  // Priority: full phrase match
  for (const entry of KB) {
    for (const key of entry.keys) {
      if (q.includes(key)) return entry.answer;
    }
  }
  // Fallback: word overlap scoring
  const words = q.split(/\W+/).filter(w => w.length > 3);
  let best = null, bestScore = 0;
  for (const entry of KB) {
    let score = 0;
    for (const key of entry.keys) {
      for (const w of words) {
        if (key.includes(w)) score++;
      }
    }
    if (score > bestScore) { bestScore = score; best = entry; }
  }
  return bestScore >= 2 ? best.answer : null;
}

const chat = document.getElementById('chat');
const input = document.getElementById('userInput');

function appendMsg(html, role) {
  const msg    = document.createElement('div');
  msg.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🔭' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML  = html;
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function buildRedirect() {
  const picks = [...REDIRECT_POOL].sort(() => 0.5 - Math.random()).slice(0, 3);
  const btns  = picks.map(q => `<button onclick="askQuestion('${q}')">${q}</button>`).join('');
  return `That topic isn't covered in today's lesson. But you could try asking me:<div class="redirect-qs">${btns}</div>`;
}

function askQuestion(text) {
  if (!text.trim()) return;
  appendMsg(text, 'user');
  setTimeout(() => {
    const answer = findAnswer(text);
    appendMsg(answer || buildRedirect(), 'bot');
  }, 280);
}

function handleSend() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  askQuestion(text);
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Welcome message on load
appendMsg(`Hi! I'm your <strong>Light Pollution Guide</strong> for today's science fair lesson. 🌌<br><br>
I can answer questions about what light pollution is, its 4 types, effects on wildlife and human health, how it's measured, and how to reduce it. Click a button above or type your own question!`, 'bot');
</script>
</body>
</html>
